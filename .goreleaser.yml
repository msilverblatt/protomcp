version: 2
builds:
  - main: ./cmd/protomcp
    binary: pmcp
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0

archives:
  - format: tar.gz
    name_template: "pmcp_{{ .Os }}_{{ .Arch }}"

brews:
  - repository:
      owner: msilverblatt
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/msilverblatt/protomcp"
    description: "Language-agnostic MCP runtime"
