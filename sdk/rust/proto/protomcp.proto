syntax = "proto3";

package protomcp;

option go_package = "github.com/msilverblatt/protomcp/gen/proto/protomcp";

// Envelope wraps all messages with length-prefixed framing.
// Wire format: 4-byte big-endian uint32 length prefix, then serialized Envelope.
message Envelope {
  oneof msg {
    // Go -> Tool Process
    ReloadRequest reload = 1;
    ListToolsRequest list_tools = 2;
    CallToolRequest call_tool = 3;

    // Tool Process -> Go
    ReloadResponse reload_response = 4;
    ToolListResponse tool_list = 5;
    CallToolResponse call_result = 6;
    EnableToolsRequest enable_tools = 7;
    DisableToolsRequest disable_tools = 8;
    SetAllowedRequest set_allowed = 9;
    SetBlockedRequest set_blocked = 10;
    GetActiveToolsRequest get_active_tools = 11;
    BatchUpdateRequest batch = 12;
    ActiveToolsResponse active_tools = 13;

    // Progress, cancellation, logging, tasks
    ProgressNotification progress = 16;
    CancelRequest cancel = 17;
    LogMessage log = 18;
    CreateTaskResponse create_task = 19;
    TaskStatusRequest task_status = 20;
    TaskStatusResponse task_status_response = 21;
    TaskResultRequest task_result = 22;
    TaskCancelRequest task_cancel = 23;

    // Middleware
    RegisterMiddlewareRequest register_middleware = 24;
    RegisterMiddlewareResponse register_middleware_response = 25;
    MiddlewareInterceptRequest middleware_intercept = 26;
    MiddlewareInterceptResponse middleware_intercept_response = 27;

    // Streaming
    StreamHeader stream_header = 28;
    StreamChunk stream_chunk = 29;

    // Raw sideband transfer
    RawHeader raw_header = 30;

    // Resources
    ListResourcesRequest list_resources_request = 31;
    ResourceListResponse resource_list_response = 32;
    ListResourceTemplatesRequest list_resource_templates_request = 33;
    ResourceTemplateListResponse resource_template_list_response = 34;
    ReadResourceRequest read_resource_request = 35;
    ReadResourceResponse read_resource_response = 36;
    ResourceChangedNotification resource_changed = 37;

    // Prompts
    ListPromptsRequest list_prompts_request = 40;
    PromptListResponse prompt_list_response = 41;
    GetPromptRequest get_prompt_request = 42;
    GetPromptResponse get_prompt_response = 43;

    // Completions
    CompletionRequest completion_request = 50;
    CompletionResponse completion_response = 51;

    // Sampling (bidirectional: SDK process -> Go -> MCP client)
    SamplingRequest sampling_request = 60;
    SamplingResponse sampling_response = 61;

    // Roots
    ListRootsRequest list_roots_request = 62;
    ListRootsResponse list_roots_response = 63;
  }
  // Correlation ID for matching requests to responses.
  string request_id = 14;
  // Namespace for future multi-process support. Ignored in v1.
  string namespace = 15;
}

// --- Go -> Tool Process ---

message ReloadRequest {}

message ListToolsRequest {}

message CallToolRequest {
  string name = 1;
  string arguments_json = 2;
  string progress_token = 3;
}

// --- Tool Process -> Go ---

message ReloadResponse {
  bool success = 1;
  string error = 2;
}

message ToolListResponse {
  repeated ToolDefinition tools = 1;
}

message ToolDefinition {
  string name = 1;
  string description = 2;
  string input_schema_json = 3;
  string output_schema_json = 4;
  string title = 5;
  bool read_only_hint = 6;
  bool destructive_hint = 7;
  bool idempotent_hint = 8;
  bool open_world_hint = 9;
  bool task_support = 10;
}

message CallToolResponse {
  bool is_error = 1;
  string result_json = 2;
  repeated string enable_tools = 3;
  repeated string disable_tools = 4;
  ToolError error = 5;
  string structured_content_json = 6;
}

message ToolError {
  string error_code = 1;
  string message = 2;
  string suggestion = 3;
  bool retryable = 4;
}

// --- Tool List Control (Tool Process -> Go) ---

message EnableToolsRequest {
  repeated string tool_names = 1;
}

message DisableToolsRequest {
  repeated string tool_names = 1;
}

message SetAllowedRequest {
  repeated string tool_names = 1;
}

message SetBlockedRequest {
  repeated string tool_names = 1;
}

message GetActiveToolsRequest {}

message BatchUpdateRequest {
  repeated string enable = 1;
  repeated string disable = 2;
  repeated string allow = 3;
  repeated string block = 4;
}

message ActiveToolsResponse {
  repeated string tool_names = 1;
}

// --- Progress, Cancellation, Logging ---

message ProgressNotification {
  string progress_token = 1;
  int64 progress = 2;
  int64 total = 3;
  string message = 4;
}

message CancelRequest {
  string request_id = 1;
}

message LogMessage {
  string level = 1;
  string logger = 2;
  string data_json = 3;
}

// --- Task (Async) Lifecycle ---

message CreateTaskResponse {
  string task_id = 1;
}

message TaskStatusRequest {
  string task_id = 1;
}

message TaskStatusResponse {
  string task_id = 1;
  string state = 2;
  int64 progress = 3;
  int64 total = 4;
  string message = 5;
}

message TaskResultRequest {
  string task_id = 1;
}

message TaskCancelRequest {
  string task_id = 1;
}

// --- Middleware ---

message RegisterMiddlewareRequest {
  string name = 1;
  int32 priority = 2;
}

message RegisterMiddlewareResponse {
  bool success = 1;
}

message MiddlewareInterceptRequest {
  string middleware_name = 1;
  string phase = 2;
  string tool_name = 3;
  string arguments_json = 4;
  string result_json = 5;
  bool is_error = 6;
}

message MiddlewareInterceptResponse {
  string arguments_json = 1;
  string result_json = 2;
  bool reject = 3;
  string reject_reason = 4;
}

// StreamHeader initiates a chunked transfer for a large field.
message StreamHeader {
  string field_name = 1;     // field being streamed, e.g. "result_json"
  uint64 total_size = 2;     // total bytes if known, 0 if unknown
  uint32 chunk_size = 3;     // bytes per chunk
}

// StreamChunk carries one chunk of a streamed field.
message StreamChunk {
  bytes data = 1;            // chunk payload
  bool final = 2;            // true on last chunk
}

// RawHeader signals that the next N bytes on the socket are raw (not protobuf-wrapped).
// This avoids protobuf serialization overhead for large payloads.
message RawHeader {
  string request_id = 1;        // which request this payload belongs to
  string field_name = 2;        // which field, e.g. "result_json"
  uint64 size = 3;               // exact byte count that follows
  string compression = 4;       // compression algorithm, e.g. "zstd" or "" (none)
  uint64 uncompressed_size = 5;  // original size before compression (0 if uncompressed)
}

// --- Resources ---

message ResourceDefinition {
  string uri = 1;
  string name = 2;
  string description = 3;
  string mime_type = 4;
  int64 size = 5;
}

message ResourceTemplateDefinition {
  string uri_template = 1;
  string name = 2;
  string description = 3;
  string mime_type = 4;
}

message ListResourcesRequest {}
message ResourceListResponse { repeated ResourceDefinition resources = 1; }
message ListResourceTemplatesRequest {}
message ResourceTemplateListResponse { repeated ResourceTemplateDefinition templates = 1; }
message ReadResourceRequest { string uri = 1; }

message ResourceContent {
  string uri = 1;
  string mime_type = 2;
  string text = 3;
  bytes blob = 4;
}

message ReadResourceResponse { repeated ResourceContent contents = 1; }
message ResourceChangedNotification { string uri = 1; }

// --- Prompts ---

message PromptArgument {
  string name = 1;
  string description = 2;
  bool required = 3;
}

message PromptDefinition {
  string name = 1;
  string description = 2;
  repeated PromptArgument arguments = 3;
}

message ListPromptsRequest {}
message PromptListResponse { repeated PromptDefinition prompts = 1; }

message GetPromptRequest {
  string name = 1;
  string arguments_json = 2;
}

message PromptMessage {
  string role = 1;
  string content_json = 2;
}

message GetPromptResponse {
  string description = 1;
  repeated PromptMessage messages = 2;
}

// --- Completions ---

message CompletionRequest {
  string ref_type = 1;
  string ref_name = 2;
  string argument_name = 3;
  string argument_value = 4;
}

message CompletionResponse {
  repeated string values = 1;
  int32 total = 2;
  bool has_more = 3;
}

// --- Sampling ---

message SamplingRequest {
  string messages_json = 1;
  string model_preferences_json = 2;
  string system_prompt = 3;
  int32 max_tokens = 4;
}

message SamplingResponse {
  string role = 1;
  string content_json = 2;
  string model = 3;
  string stop_reason = 4;
  string error = 5;
}

// --- Roots ---

message ListRootsRequest {}

message RootDef {
  string uri = 1;
  string name = 2;
}

message ListRootsResponse {
  repeated RootDef roots = 1;
}
