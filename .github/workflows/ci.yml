name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go vet ./cmd/... ./internal/bridge ./internal/cancel ./internal/cli ./internal/config ./internal/envelope ./internal/playground ./internal/reload ./internal/tasks ./internal/toollist ./internal/validate
      - run: go test -timeout 120s ./internal/bridge ./internal/cancel ./internal/config ./internal/envelope ./internal/reload ./internal/tasks ./internal/toollist ./internal/validate
      - run: go build ./cmd/protomcp/

  go-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: cd sdk/go && go test ./...

  python-sdk:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: cd sdk/python && pip install -e ".[dev]" && python -m pytest

  typescript-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd sdk/typescript && npm ci && npm run build && npx vitest run

  rust-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler
      - run: cd sdk/rust && cargo test -- --test-threads=1
      - run: cd sdk/rust && cargo clippy -- -D warnings

  e2e:
    runs-on: ubuntu-latest
    needs: [go]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: go build -o bin/pmcp ./cmd/protomcp/
      - run: cd sdk/python && pip install -e .
      - run: cd sdk/typescript && npm ci && npm run build
      - run: go test ./test/e2e/ -v -timeout 60s
